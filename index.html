<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite Digital</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="petalas"></div>

  <main class="convite">

    <section class="topo">
      <p id="frase" class="frase"></p>
      <h1 id="nome" class="nome"></h1>

      <p class="subtexto">
        convida você para<br>
        celebrar seus 15 anos
      </p>
    </section>

    <section class="data">
      <span id="diaEvento"></span>
      <em id="mesEvento"></em>
    </section>

    <p class="faltam">e faltam apenas...</p>

    <section class="contador">
      <div><strong id="dias">00</strong><span>Dias</span></div>
      <div><strong id="horas">00</strong><span>Horas</span></div>
      <div><strong id="minutos">00</strong><span>Min</span></div>
      <div><strong id="segundos">00</strong><span>Seg</span></div>
    </section>

    <section class="detalhes">

    <div class="bloco">

        <h2>Horário</h2>

        <p id="horario"></p>

    </div>

    <div class="bloco">

        <h2>Localização</h2>

        <p id="local"></p>

    </div>

</section>

    <section class="botoes">
  <a 
    id="btnMaps"
    href="https://maps.app.goo.gl/uxL5KbVN7XQWNgK9A"
    target="_blank"
    rel="noopener noreferrer">
    Como chegar
  </a>

  <a 
    id="btnPresentes"
    href="COLE_AQUI_O_LINK_DA_LISTA_DE_PRESENTES"
    target="_blank"
    rel="noopener noreferrer">
    Lista de presentes
  </a>

  <a 
    id="btnForms"
    href="COLE_AQUI_O_LINK_DO_FORMULARIO"
    target="_blank"
    rel="noopener noreferrer">
    Confirmar presença
  </a>
</section>

    <footer>
      Sua presença tornará esse momento ainda mais especial!
    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
